seed: 123
device: cpu

paths:
  data_dir: data
  output_dir: outputs
  checkpoint_dir: checkpoints
  dataset_file: burgers_1d.npz
  checkpoint_file: fno1d.pt
  baseline_checkpoint_file: baseline_cnn.pt
  train_metrics_file: fno_train_metrics.json
  eval_metrics_file: fno_eval_metrics.json
  baseline_train_metrics_file: baseline_train_metrics.json
  baseline_eval_metrics_file: baseline_eval_metrics.json
  comparison_metrics_file: model_comparison_metrics.json
  result_summary_file: result_summary.md
  prediction_plot_file: prediction_comparison.png
  loss_curve_file: loss_curves.png

data:
  n_grid: 32
  viscosity: 0.01
  time_horizon: 0.1
  time_steps: 20
  initial_condition_modes: 4
  train_samples: 64
  val_samples: 16
  test_samples: 16

model:
  modes: 8
  width: 16
  layers: 3

baseline:
  channels: 32
  layers: 4
  kernel_size: 5

training:
  batch_size: 8
  learning_rate: 0.001
  epochs: 8

smoke:
  n_samples: 8
  n_grid: 32
  time_steps: 10
  modes: 6
  width: 8
  layers: 2
  train_steps: 1
